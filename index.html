<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Список дел</title>
    <link rel="stylesheet" href="main.css">
</head>
<body>
    <div id="shopping-list">
        <div class="wrapper">
            <div class="header">
                <h1>{{ header }}</h1>
                <button v-if="editing" @click="doEdit(false)" class="btn cancel">Отмена</button>
                <button v-else @click="doEdit(true)" class="btn add">Добавить</button>
            </div>

            <div v-if="editing" class="form">
                <input 
                    type="text" 
                    v-model.trim="newItem" 
                    @keyup.enter="saveItem"
                    placeholder="Что нужно сделать?"
                >
                <label class="priority-label">
                    <input type="checkbox" v-model="newItemHighPriority">
                    Высокий приоритет
                </label>
                <div class="form-footer">
                    <span class="counter">{{ newItem.length }}/200</span>
                    <button @click="saveItem" :disabled="newItem.length < 2" class="btn save">Сохранить</button>
                </div>
            </div>

            <p v-if="items.length === 0" class="empty">Список пуст</p>

            <ul class="list">
                <li 
                    v-for="item in reversedItems" 
                    :key="item.id"
                    @click="togglePurchased(item)"
                    class="item"
                >
                    <span 
                        :class="{
                            done: item.purchased,
                            high: item.highPriority && !item.purchased
                        }"
                    >
                        {{ item.label }}
                    </span>
                </li>
            </ul>
        </div>
    </div>

    <script src="https://unpkg.com/vue@3"></script>
    <script>
        const app = Vue.createApp({
            data() {
                return {
                    header: 'Список дел',
                    editing: false,
                    newItem: '',
                    newItemHighPriority: false,
                    items: [
                        { id: 1, label: 'Вырастить дом', purchased: false, highPriority: false },
                        { id: 2, label: 'Посадить сына', purchased: true, highPriority: false },
                        { id: 3, label: 'Прогулка', purchased: false, highPriority: true }
                    ]
                }
            },
            computed: {
                reversedItems() {
                    return [...this.items].reverse()
                }
            },
            methods: {
                saveItem() {
                    if (this.newItem.length < 2) return
                    this.items.push({
                        id: this.items.length + 1,
                        label: this.newItem,
                        purchased: false,
                        highPriority: this.newItemHighPriority
                    })
                    this.newItem = ''
                    this.newItemHighPriority = false
                    this.editing = false
                },
                togglePurchased(item) {
                    item.purchased = !item.purchased
                },
                doEdit(editing) {
                    this.editing = editing
                    if (!editing) {
                        this.newItem = ''
                        this.newItemHighPriority = false
                    }
                }
            }
        })
        app.mount('#shopping-list')
    </script>
</body>
</html>
